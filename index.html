<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 釜山賞櫻之旅</title>
    <style>
        :root {
            --primary: #ffb7c5;
            --accent: #ff6b81;
            --bg: #fff5f7;
            --card-white: #ffffff;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0; color: #444;
            line-height: 1.6;
        }
        /* 頂部橫幅 */
        .hero {
            background: linear-gradient(135deg, rgba(255,183,197,0.8), rgba(255,107,129,0.8)), 
                        url('https://images.unsplash.com/photo-1528660351311-df232d9894e4?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            height: 220px; display: flex; align-items: center; justify-content: center;
            color: white; text-align: center; flex-direction: column;
        }
        .hero h1 { margin: 0; font-size: 2.2rem; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .container { max-width: 550px; margin: -40px auto 50px; padding: 0 15px; }

        /* 互動卡片樣式 */
        .day-card {
            background: var(--card-white);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(255,183,197,0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .day-card:hover { transform: translateY(-5px); }

        .day-header {
            padding: 20px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #fef0f2;
        }
        .day-header h2 { margin: 0; font-size: 1.25rem; color: var(--accent); }
        .day-header .date { font-size: 0.9rem; color: #888; font-weight: bold; }

        /* 行程內容區（預設展開，點擊可收合） */
        .day-content {
            padding: 0 20px 20px;
            display: block; /* 初始狀態為顯示 */
            animation: slideDown 0.4s ease-out;
        }

        .item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px dashed #eee;
        }
        .item:last-child { border-bottom: none; }

        .time {
            min-width: 60px;
            font-weight: 900;
            color: var(--accent);
            font-size: 0.95rem;
        }
        .info b { display: block; font-size: 1.05rem; color: #333; }
        .info span { font-size: 0.85rem; color: #777; }

        /* 標籤 */
        .tag {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 6px;
            margin-left: 5px; vertical-align: middle; font-weight: bold;
        }
        .tag-sakura { background: #ffe3e8; color: #ff4d6d; }
        .tag-food { background: #fff4e6; color: #d35400; }
        .tag-vbp { background: #e3f2fd; color: #1976d2; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>🌸 2026 釜山賞櫻之旅</h1>
    <p>與家人的溫馨六日遊</p>
</div>

<div class="container">
    <div class="day-card" onclick="toggleCard(this)">
        <div class="day-header">
            <h2>Day 1 | 雙倍櫻花震撼</h2>
            <span class="date">04/08 (三)</span>
        </div>
        <div class="day-content">
            <div class="item">
                <div class="time">08:00</div>
                <div class="info"><b>沙上豬肉湯飯</b><span class="tag tag-food">推薦</span><span>下機第一餐暖胃</span></div>
            </div>
            <div class="item">
                <div class="time">10:00</div>
                <div class="info"><b>大渚生態公園</b><span class="tag tag-sakura">賞櫻</span><span>粉白櫻花隧道與油菜花</span></div>
            </div>
            <div class="item">
                <div class="time">15:00</div>
                <div class="info"><b>南川洞櫻花路</b><span class="tag tag-sakura">必看</span><span>海邊的最美櫻吹雪</span></div>
            </div>
        </div>
    </div>

    <div class="day-card" onclick="toggleCard(this)">
        <div class="day-header">
            <h2>Day
