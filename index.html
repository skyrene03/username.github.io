<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 釜山賞櫻之旅</title>
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --accent-pink: #ff8fa3;
            --bg-gray: #f8f9fa;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-gray);
            margin: 0; padding: 0; color: #333;
        }
        /* 頂部大圖裝飾 */
        .hero {
            background: linear-gradient(rgba(255,183,197,0.4), rgba(255,183,197,0.4)), 
                        url('https://images.unsplash.com/photo-1528660351311-df232d9894e4?auto=format&fit=crop&q=80&w=1000'); /* 櫻花背景圖 */
            background-size: cover;
            background-position: center;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            flex-direction: column;
        }
        .hero h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        .hero p { font-size: 1.1rem; margin-top: 10px; }

        .container { max-width: 600px; margin: -40px auto 50px; padding: 0 15px; position: relative; }

        /* 卡片樣式 */
        .day-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .day-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #fff0f3;
            padding-bottom: 10px;
        }
        .day-header h2 { color: var(--accent-pink); margin: 0; font-size: 1.4rem; }
        .day-header .date { margin-left: auto; color: #888; font-weight: bold; }

        /* 時間軸行程清單 */
        .schedule-item {
            display: flex;
            margin-bottom: 15px;
            position: relative;
        }
        .time {
            min-width: 65px;
            font-weight: 800;
            color: var(--accent-pink);
            font-size: 0.95rem;
        }
        .content {
            padding-left: 15px;
            border-left: 2px solid #eee;
            flex: 1;
        }
        .content b { display: block; font-size: 1.05rem; margin-bottom: 3px; }
        .content span { font-size: 0.9rem; color: #666; }

        /* 標籤樣式 */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            margin-left: 5px;
            font-weight: bold;
        }
        .tag-vbp { background: #e3f2fd; color: #1976d2; }
        .tag-food { background: #fff3e0; color: #e65100; }
        .tag-sakura { background: #fff0f3; color: #d81b60; }
    </style>
</head>
<body>

<div class="hero">
    <h1>釜山賞櫻之旅</h1>
    <p>2026.04.08 - 04.13 | 孝親六日遊</p>
</div>

<div class="container">
    <div class="day-card">
        <div class="day-header">
            <h2>
