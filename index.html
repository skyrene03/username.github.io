<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 釜山賞櫻之旅</title>
    <style>
        /* 視覺風格設定 */
        :root { --blue: #007bff; --pink: #ff6b81; }
        body { font-family: sans-serif; margin: 0; background: #fff5f7; color: #333; line-height: 1.5; }
        
        /* 背景模糊效果 */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; 
               background: url('https://images.unsplash.com/photo-1528660351311-df232d9894e4?auto=format&fit=crop&q=80&w=1500') center/cover; 
               opacity: 0.2; z-index: -1; }

        header { text-align: center; padding: 40px 20px; }
        
        /* 導覽列 */
        .nav-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000; }
        .nav-btn { background: white; border: 1px solid #ddd; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 4px 10px rgba(0,123,255,0.3); }

        .container { max-width: 600px; margin: 0 auto 50px; padding: 0 15px; }

        /* 內容區塊 */
        .section { display: none; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .section.active { display: block; animation: fadeIn 0.4s; }

        /* 匯率計算機 */
        .calc-row { margin-bottom: 15px; }
        .calc-row label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }

        /* 行前準備清單 */
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 1.1rem; cursor: pointer; }
        .check-item input { width: 22px; height: 22px; cursor: pointer; margin: 0; }
        .check-item input:checked + span { text-decoration: line-through; color: #bbb; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg"></div>

<header>
    <h1 style="color: #d81b60;">🌸 2026 釜山賞櫻</h1>
    <p>4/08 - 4/13 孝親計畫</p>
</header>

<div class="container">
    <div class="nav-bar">
        <button class="nav-btn active" onclick="showTab('calc', this)">💱 匯率</button>
        <button class="nav-btn" onclick="showTab('prep', this)">行前準備</button>
        <button class="nav-btn" onclick="showTab('d1', this)">Day 1</button>
        <button class="nav-btn" onclick="showTab('d2', this)">Day 2</button>
        <button class="nav-btn" onclick="showTab('d3', this)">Day 3</button>
    </div>

    <div id="calc" class="section active">
        <h3>💱 韓幣匯率計算</h3>
        <div class="calc-row">
            <label>設定匯率 (1台幣 = ?韓幣)</label>
            <input type="number" id="rate" value="42" oninput="calc('r')">
        </div>
        <div class="calc-row">
            <label>韓幣 (KRW) ₩</label>
            <input type="number" id="krw" placeholder="輸入韓幣" oninput
